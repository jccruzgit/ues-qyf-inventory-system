spring:
  application:
    name: inventory-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/qyf_inventory}
    username: ${DB_USERNAME:qyf_user}
    password: ${DB_PASSWORD:qyf_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:ues-qyf-inventory-system-jwt-secret-key-2026}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  demo:
    seed:
      enabled: ${APP_DEMO_SEED_ENABLED:false}
